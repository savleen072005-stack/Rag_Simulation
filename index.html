<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Her Daily Ritual | RAG Simulator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .step-card { transition: all 0.3s ease; border-left: 4px solid #e2e8f0; opacity: 0.6; }
        .step-active { border-left-color: #3b82f6; background-color: #f8fafc; transform: translateX(10px); opacity: 1; }
        .chunk-box { font-family: 'Inter', sans-serif; font-size: 0.75rem; transition: all 0.2s; }
        .match-highlight { background-color: #dcfce7; border-color: #22c55e; color: #166534; font-weight: 600; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 font-sans pb-20">

    <header class="bg-white border-b border-slate-200 py-6 px-8 mb-8 shadow-sm">
        <div class="max-w-6xl mx-auto flex justify-between items-center">
            <div>
                <h1 class="text-2xl font-bold text-slate-900 tracking-tight">RAG Strategy Simulator</h1>
                <p class="text-slate-500 text-sm">Testing "Soft Discipline" & "Slow Living" Knowledge Base</p>
            </div>
            <div class="flex gap-2">
                <span class="bg-green-100 text-green-700 text-[10px] font-bold px-2 py-1 rounded uppercase tracking-wider">Grounded</span>
                <span class="bg-blue-100 text-blue-700 text-[10px] font-bold px-2 py-1 rounded uppercase tracking-wider">Deterministic</span>
            </div>
        </div>
    </header>

    <main class="max-w-6xl mx-auto px-4 grid grid-cols-1 lg:grid-cols-3 gap-8">
        
        <div class="lg:col-span-1 space-y-6">
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
                <label class="block text-xs font-bold text-slate-400 uppercase mb-2">1. Knowledge Base (Context)</label>
                <textarea id="kbInput" class="w-full h-64 p-4 border border-slate-200 rounded-xl text-sm focus:ring-2 focus:ring-blue-500 outline-none leading-relaxed" placeholder="Paste your article here...">The Rise of the Soft Professional: Embracing Slow Living. Soft discipline is rooted in self-respect rather than self-control. It acknowledges that the female experience is cyclical. Slow living isn't about doing nothing; it’s about doing everything at the right speed. Today’s successful woman isn't the one who stayed latest at the office; she is the one who designed a life where her presence is required only where it matters most.</textarea>
            </div>

            <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
                <label class="block text-xs font-bold text-slate-400 uppercase mb-2">2. User Query</label>
                <input id="queryInput" type="text" class="w-full p-4 border border-slate-200 rounded-xl text-sm focus:ring-2 focus:ring-blue-500 outline-none" value="What is soft discipline?">
                <button onclick="runRAG()" class="w-full mt-4 bg-slate-900 hover:bg-black text-white font-semibold py-4 rounded-xl transition shadow-lg active:scale-95">Run Pipeline</button>
            </div>
        </div>

        <div class="lg:col-span-2 space-y-4">
            
            <div id="step-chunk" class="step-card bg-white p-6 rounded-2xl border border-slate-200 shadow-sm">
                <h4 class="font-bold text-sm uppercase tracking-widest text-slate-400 mb-4">Step 1: Sentence Chunking</h4>
                <div id="chunkDisplay" class="flex flex-wrap gap-2">
                    <p class="text-slate-300 italic text-sm italic">Waiting for input...</p>
                </div>
            </div>

            <div id="step-retrieval" class="step-card bg-white p-6 rounded-2xl border border-slate-200 shadow-sm">
                <h4 class="font-bold text-sm uppercase tracking-widest text-slate-400 mb-4">Step 2: Semantic Retrieval (Search)</h4>
                <div id="retrievalDisplay" class="space-y-3">
                    <p class="text-slate-300 italic text-sm italic">System will find top matching sentences...</p>
                </div>
            </div>

            <div id="step-llm" class="step-card bg-white p-6 rounded-2xl border border-slate-200 shadow-sm">
                <h4 class="font-bold text-sm uppercase tracking-widest text-slate-400 mb-4">Step 3: Grounded LLM Answer</h4>
                <div class="bg-slate-50 border border-slate-100 p-5 rounded-xl font-medium text-slate-700 min-h-[80px]" id="llmOutput">
                    <span class="text-slate-300 italic">The final answer will appear here.</span>
                </div>
            </div>

        </div>
    </main>

    <script>
        function runRAG() {
            const kbText = document.getElementById('kbInput').value;
            const query = document.getElementById('queryInput').value;
            const output = document.getElementById('llmOutput');
            
            // RESET STATES
            document.querySelectorAll('.step-card').forEach(c => c.classList.remove('step-active'));
            
            // 1. CHUNKING LOGIC (Split by sentence)
            const chunks = kbText.split(/[.!?]/).filter(s => s.trim().length > 5);
            const chunkDisplay = document.getElementById('chunkDisplay');
            chunkDisplay.innerHTML = '';
            chunks.forEach((c, i) => {
                chunkDisplay.innerHTML += `<span id="chunk-${i}" class="bg-white border border-slate-200 px-3 py-2 rounded-lg text-xs chunk-box shadow-sm">${c.trim()}.</span>`;
            });
            document.getElementById('step-chunk').classList.add('step-active');

            // 2. RETRIEVAL LOGIC (Search query words in chunks)
            setTimeout(() => {
                const queryWords = query.toLowerCase().split(' ').filter(w => w.length > 3);
                const retrievalDisplay = document.getElementById('retrievalDisplay');
                retrievalDisplay.innerHTML = '';
                
                let foundIndices = [];
                const relevant = chunks.filter((chunk, index) => {
                    const match = queryWords.some(word => chunk.toLowerCase().includes(word));
                    if(match) foundIndices.push(index);
                    return match;
                }).slice(0, 2);

                if(relevant.length === 0) {
                    retrievalDisplay.innerHTML = `<div class="p-3 bg-red-50 text-red-600 rounded-lg text-xs font-bold">OUT OF CONTEXT: No matches found in your article.</div>`;
                } else {
                    relevant.forEach(r => {
                        retrievalDisplay.innerHTML += `<div class="bg-blue-50 border border-blue-100 p-3 text-sm rounded-xl text-blue-800 font-medium animate-pulse">✓ Matched: "${r.trim()}."</div>`;
                    });
                    // Highlight the chunks in Step 1
                    foundIndices.forEach(idx => {
                        const el = document.getElementById(`chunk-${idx}`);
                        if(el) el.classList.add('match-highlight');
                    });
                }
                document.getElementById('step-retrieval').classList.add('step-active');

                // 3. GENERATION LOGIC
                setTimeout(() => {
                    document.getElementById('step-llm').classList.add('step-active');
                    if (relevant.length > 0) {
                        output.innerHTML = `<span class="text-blue-600 font-bold">Grounded Answer:</span><br>${relevant.join('. ')}.`;
                    } else {
                        output.innerHTML = `<span class="text-red-500">I'm sorry, my knowledge base doesn't have information on that specific topic. Feel free to add it to the box on the left!</span>`;
                    }
                }, 800);

            }, 600);
        }
    </script>
</body>
</html>
